services:
  db:
    image: postgres:17
    env_file: .env
    ports:
      - "5432:5432"
    networks:
      - mlflow
    volumes:
      - pgdata:/var/lib/postgresql/data

  mlflow:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - mlflow
    command: >
      sh -c "
      mlflow server
      --workers=1
      --host 0.0.0.0
      --port 8080
      --backend-store-uri=${MLFLOW_SERVER_FILE_STORE}
      --serve-artifacts
      "

  minio:
    image: minio/minio:RELEASE.2022-04-12T06-55-35Z
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ':9001' --address ':9000'
    networks:
      - mlflow
    environment:
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY}
      - MINIO_HTTP_TRACE=/dev/stdout
      - MINIO_DOMAIN=minio:9000
    volumes:
      - ./data/minio:/data

networks:
  mlflow:

volumes:
  pgdata: